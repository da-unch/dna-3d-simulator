<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DNA / タンパク質 3Dシミュレーター</title>
<style>
  :root { --bg:#0a0e17; --panel:#141b2b; --line:#26324a; --txt:#e6edf6; --dim:#8ea2c0; --accent:#5cc8ff; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; overflow:hidden; background:var(--bg); color:var(--txt);
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; }
  #app { position:fixed; inset:0; }
  canvas { display:block; }

  #panel {
    position:fixed; top:12px; left:12px; width:290px; max-height:calc(100% - 24px);
    overflow-y:auto; background:rgba(20,27,43,.92); border:1px solid var(--line);
    border-radius:12px; padding:14px; backdrop-filter:blur(8px); font-size:13px; z-index:10;
  }
  #panel h1 { font-size:15px; margin:0 0 4px; letter-spacing:.02em; }
  #panel .sub { color:var(--dim); font-size:11px; margin:0 0 12px; line-height:1.5; }
  .group { border-top:1px solid var(--line); padding:11px 0 3px; }
  .group h2 { font-size:11px; color:var(--dim); margin:0 0 8px; text-transform:uppercase; letter-spacing:.08em; }
  .row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  button {
    flex:1; min-width:60px; background:var(--panel); color:var(--txt); border:1px solid var(--line);
    border-radius:8px; padding:7px 8px; font-size:12px; cursor:pointer; transition:.12s;
  }
  button:hover { border-color:var(--accent); color:var(--accent); }
  button.on { background:var(--accent); color:#04121d; border-color:var(--accent); font-weight:600; }
  label.slider { display:block; color:var(--dim); font-size:11px; margin:9px 0 3px; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  .seq { font-family: ui-monospace, monospace; font-size:12px; letter-spacing:1px; word-break:break-all;
    background:#0c1220; border:1px solid var(--line); border-radius:8px; padding:8px; line-height:1.7; }
  .legend { display:flex; gap:10px; flex-wrap:wrap; font-size:11px; color:var(--dim); }
  .legend i { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:4px; vertical-align:-1px; }
  #hint { position:fixed; bottom:12px; left:12px; color:var(--dim); font-size:11px; z-index:10;
    background:rgba(10,14,23,.7); padding:6px 10px; border-radius:8px; }
  #mode { position:fixed; top:12px; right:12px; z-index:10; background:rgba(20,27,43,.92);
    border:1px solid var(--line); border-radius:10px; padding:8px 12px; font-size:12px; color:var(--dim); }
  #mode b { color:var(--accent); }
</style>
</head>
<body>
<div id="app"></div>

<div id="panel">
  <h1>DNA / タンパク質 3D</h1>
  <p class="sub">ドラッグで視点回転・ホイールでズーム。粒子を <b>掴んで引っ張る</b> と結合が伸び、離すと自然に安定形へ戻る。</p>

  <div class="group">
    <h2>DNA 塩基編集</h2>
    <div class="row"><button id="pickMode">塩基を選ぶ: OFF</button></div>
    <div class="row">
      <button data-base="A">A</button><button data-base="T">T</button>
      <button data-base="G">G</button><button data-base="C">C</button>
    </div>
    <div class="legend">
      <span><i style="background:#ff6b6b"></i>A</span>
      <span><i style="background:#ffd166"></i>T</span>
      <span><i style="background:#4dd4ac"></i>G</span>
      <span><i style="background:#5cc8ff"></i>C</span>
      <span><i style="background:#ffffff"></i>メチル化</span>
    </div>
    <div class="seq" id="seqBox" style="margin-top:8px"></div>
  </div>

  <div class="group">
    <h2>エピジェネ修飾</h2>
    <div class="row">
      <button id="methToggle">メチル化ペン: OFF</button>
    </div>
    <label class="slider">凝集の強さ（クロマチン折りたたみ）</label>
    <input type="range" id="compact" min="0" max="100" value="0" />
    <p class="sub" style="margin:6px 0 0">C(シトシン)を選んで塗るとメチル基が付き、その領域が引き寄せ合って畳まれる。</p>
  </div>

  <div class="group">
    <h2>タンパク質</h2>
    <div class="row">
      <button id="translate">転写・翻訳して折りたたむ</button>
    </div>
    <div class="row">
      <button id="refold">再フォールド</button>
      <button id="showDNA" class="on">DNA表示</button>
    </div>
    <div class="seq" id="protBox" style="min-height:20px">まだ翻訳していません</div>
    <div class="legend" style="margin-top:6px">
      <span><i style="background:#ffb454"></i>疎水性</span>
      <span><i style="background:#63b3ff"></i>親水性</span>
      <span><i style="background:#ff77aa"></i>特殊</span>
    </div>
  </div>

  <div class="group">
    <h2>物理</h2>
    <label class="slider">結合の硬さ</label>
    <input type="range" id="stiff" min="5" max="60" value="28" />
    <label class="slider">粘性（揺れの収まりやすさ）</label>
    <input type="range" id="damp" min="70" max="99" value="90" />
    <div class="row" style="margin-top:8px"><button id="reset">リセット</button></div>
  </div>
</div>

<div id="mode">操作モード: <b id="modeLabel">視点</b></div>
<div id="hint">粒子をドラッグ=引っ張る / 背景をドラッグ=回転 / ダブルクリックで塩基をランダム変異</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
// ============================================================
//  DNA / タンパク質 3Dシミュレーター  （単一ファイル・ビルド不要）
//  物理: バネ+Verlet。塩基対は「磁力的」な引力でつながり、
//  引っ張ると外れ、離すと安定形へ戻る。
// ============================================================
const { Scene, PerspectiveCamera, WebGLRenderer, Color, Vector3,
  AmbientLight, DirectionalLight, SphereGeometry, MeshStandardMaterial,
  Mesh, Group, CylinderGeometry, Raycaster, Vector2, Plane } = THREE;

const container = document.getElementById('app');
const scene = new Scene();
scene.background = new Color(0x0a0e17);
const camera = new PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 500);
camera.position.set(0, 4, 34);
const renderer = new WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;

scene.add(new AmbientLight(0xffffff, 0.55));
const dl = new DirectionalLight(0xffffff, 0.9); dl.position.set(10,20,15); scene.add(dl);
const dl2 = new DirectionalLight(0x88aaff, 0.35); dl2.position.set(-15,-8,-10); scene.add(dl2);

// ---------- 色 ----------
const BASE_COLORS = { A:0xff6b6b, T:0xffd166, G:0x4dd4ac, C:0x5cc8ff };
const COMPLEMENT  = { A:'T', T:'A', G:'C', C:'G' };
const BASES = ['A','T','G','C'];

// ---------- 物理エンジン（ノード＋バネ） ----------
// node: {pos, prev, mesh, pinned, base?, strand?, idx?, meth?}
// bond: {a, b, rest, k, type}  type: backbone|pair|protein|hydrophobic
let nodes = [], bonds = [];
let params = { stiff:0.28, damp:0.90, compact:0, showDNA:true };

function makeNode(x,y,z, opts={}) {
  const n = Object.assign({
    pos: new Vector3(x,y,z), prev: new Vector3(x,y,z),
    force: new Vector3(), pinned:false, mesh:null, meth:false,
  }, opts);
  nodes.push(n); return n;
}
function bond(a,b,k,type,rest){
  bonds.push({ a,b,k, type, rest: rest!=null?rest:a.pos.distanceTo(b.pos) });
}

// ---------- DNA構築 ----------
let sequence = "ATGGCACGTTACGGATCCAAAGAGTGA".split(''); // 開始ATG含む例
let helixNodes = [];     // strand1
let helixNodesB = [];    // strand2 (complement)
let pairBonds = [];
const dnaGroup = new Group(); scene.add(dnaGroup);

const sphereGeo = new SphereGeometry(1, 20, 16);
function baseMesh(color){
  const m = new Mesh(sphereGeo, new MeshStandardMaterial({ color, roughness:.4, metalness:.15 }));
  return m;
}

// bond可視化: 細い円柱を毎フレーム更新
const bondGroup = new Group(); scene.add(bondGroup);
function makeBondMesh(color, r){
  const g = new CylinderGeometry(r, r, 1, 6);
  const m = new Mesh(g, new MeshStandardMaterial({ color, roughness:.6,
    transparent:true, opacity:.85 }));
  bondGroup.add(m); return m;
}
function orientBond(mesh, a, b){
  const mid = a.clone().add(b).multiplyScalar(0.5);
  mesh.position.copy(mid);
  const dir = b.clone().sub(a); const len = dir.length();
  mesh.scale.set(1, Math.max(len,0.001), 1);
  mesh.quaternion.setFromUnitVectors(new Vector3(0,1,0), dir.normalize());
}

function buildDNA(){
  // クリア
  nodes = []; bonds = []; helixNodes=[]; helixNodesB=[]; pairBonds=[];
  while(dnaGroup.children.length) dnaGroup.remove(dnaGroup.children[0]);
  while(bondGroup.children.length) bondGroup.remove(bondGroup.children[0]);

  const N = sequence.length;
  const rise = 1.6, radius = 4.2, twist = 0.55;
  const yStart = -(N-1)*rise/2;
  for(let i=0;i<N;i++){
    const ang = i*twist;
    const y = yStart + i*rise;
    const a = makeNode(Math.cos(ang)*radius, y, Math.sin(ang)*radius,
      { base:sequence[i], strand:0, idx:i });
    const bAng = ang + Math.PI;
    const comp = COMPLEMENT[sequence[i]];
    const b = makeNode(Math.cos(bAng)*radius, y, Math.sin(bAng)*radius,
      { base:comp, strand:1, idx:i });
    a.mesh = baseMesh(BASE_COLORS[a.base]); a.mesh.userData.node=a; dnaGroup.add(a.mesh);
    b.mesh = baseMesh(BASE_COLORS[b.base]); b.mesh.userData.node=b; dnaGroup.add(b.mesh);
    a.mesh.scale.setScalar(0.85); b.mesh.scale.setScalar(0.85);
    a.methMesh = methMarker(a); b.methMesh = methMarker(b);
    helixNodes.push(a); helixNodesB.push(b);
    // 塩基対（磁力的な結合）
    const pb = { a, b, k:0.06, type:'pair', rest: radius*2*0.62 };
    bonds.push(pb); pairBonds.push(pb);
    pb.mesh = makeBondMesh(0x66788f, 0.08);
  }
  // 背骨（同一鎖の隣接をつなぐ）
  for(let i=0;i<N-1;i++){
    const b1 = { a:helixNodes[i], b:helixNodes[i+1], k:0.4, type:'backbone' };
    b1.rest = b1.a.pos.distanceTo(b1.b.pos); bonds.push(b1);
    b1.mesh = makeBondMesh(0xff9a8b, 0.11);
    const b2 = { a:helixNodesB[i], b:helixNodesB[i+1], k:0.4, type:'backbone' };
    b2.rest = b2.a.pos.distanceTo(b2.b.pos); bonds.push(b2);
    b2.mesh = makeBondMesh(0x8bb4ff, 0.11);
  }
  updateSeqBox();
}

function methMarker(node){
  const m = new Mesh(new SphereGeometry(0.35,10,8),
    new MeshStandardMaterial({ color:0xffffff, emissive:0x555555 }));
  m.visible=false; dnaGroup.add(m); return m;
}

// ---------- タンパク質（翻訳＋フォールディング） ----------
const CODON_TABLE = {
  TTT:'F',TTC:'F',TTA:'L',TTG:'L',CTT:'L',CTC:'L',CTA:'L',CTG:'L',
  ATT:'I',ATC:'I',ATA:'I',ATG:'M',GTT:'V',GTC:'V',GTA:'V',GTG:'V',
  TCT:'S',TCC:'S',TCA:'S',TCG:'S',CCT:'P',CCC:'P',CCA:'P',CCG:'P',
  ACT:'T',ACC:'T',ACA:'T',ACG:'T',GCT:'A',GCC:'A',GCA:'A',GCG:'A',
  TAT:'Y',TAC:'Y',TAA:'*',TAG:'*',CAT:'H',CAC:'H',CAA:'Q',CAG:'Q',
  AAT:'N',AAC:'N',AAA:'K',AAG:'K',GAT:'D',GAC:'D',GAA:'E',GAG:'E',
  TGT:'C',TGC:'C',TGA:'*',TGG:'W',CGT:'R',CGC:'R',CGA:'R',CGG:'R',
  AGT:'S',AGC:'S',AGA:'R',AGG:'R',GGT:'G',GGC:'G',GGA:'G',GGG:'G'
};
// 疎水性(1)/親水性(-1)/特殊(0) と色
const AA_PROP = {
  A:['疎',1],V:['疎',1],L:['疎',1],I:['疎',1],M:['疎',1],F:['疎',1],W:['疎',1],P:['特',0],
  G:['特',0],C:['特',0],
  S:['親',-1],T:['親',-1],Y:['親',-1],N:['親',-1],Q:['親',-1],
  D:['親',-1],E:['親',-1],K:['親',-1],R:['親',-1],H:['親',-1]
};
function aaColor(a){ const p=AA_PROP[a]?AA_PROP[a][1]:0;
  return p>0?0xffb454 : p<0?0x63b3ff : 0xff77aa; }

let proteinNodes = [];
const protGroup = new Group(); scene.add(protGroup);
let hasProtein = false;

function translate(){
  const seq = sequence.join('');
  let start = seq.indexOf('ATG');
  if(start<0) start=0;
  const aas=[];
  for(let i=start;i+3<=seq.length;i+=3){
    const c = seq.substr(i,3);
    const aa = CODON_TABLE[c];
    if(aa==='*'||!aa) break;
    aas.push(aa);
  }
  buildProtein(aas);
  document.getElementById('protBox').textContent =
    aas.length? aas.join('') + '  ('+aas.length+' 残基)' : '停止コドンまでにアミノ酸なし';
}

function buildProtein(aas){
  // 既存除去
  for(let i=nodes.length-1;i>=0;i--) if(nodes[i].strand===2) nodes.splice(i,1);
  bonds = bonds.filter(b=>b.type!=='protein'&&b.type!=='hydrophobic');
  while(protGroup.children.length) protGroup.remove(protGroup.children[0]);
  proteinNodes=[];
  hasProtein = aas.length>0;
  if(!hasProtein) return;

  const off = new Vector3(16, 0, 0); // DNAの横に配置
  aas.forEach((aa,i)=>{
    const n = makeNode(off.x + (i - aas.length/2)*1.4,
      off.y + (Math.random()-.5)*0.5, off.z + (Math.random()-.5)*0.5,
      { strand:2, aa, idx:i, hyd: AA_PROP[aa]?AA_PROP[aa][1]:0 });
    n.mesh = baseMesh(aaColor(aa)); n.mesh.scale.setScalar(0.7);
    n.mesh.userData.node = n; protGroup.add(n.mesh);
    proteinNodes.push(n);
  });
  // ペプチド結合（背骨）
  for(let i=0;i<proteinNodes.length-1;i++){
    const b = { a:proteinNodes[i], b:proteinNodes[i+1], k:0.5, type:'protein', rest:1.4 };
    bonds.push(b); b.mesh = makeBondMesh(0xcfd8e6, 0.09);
  }
  // 疎水性コラプス: 疎水性残基どうしが弱く引き合う
  for(let i=0;i<proteinNodes.length;i++){
    for(let j=i+2;j<proteinNodes.length;j++){
      if(proteinNodes[i].hyd>0 && proteinNodes[j].hyd>0){
        bonds.push({ a:proteinNodes[i], b:proteinNodes[j], k:0.012,
          type:'hydrophobic', rest:2.4 });
      }
    }
  }
  if(!params.showDNA){ dnaGroup.visible=false; bondGroup.visible=false; }
}

// ---------- 物理ステップ（Verlet） ----------
const tmp = new Vector3();
function physics(){
  const stiff = params.stiff;
  // バネ力
  for(const b of bonds){
    tmp.copy(b.b.pos).sub(b.a.pos);
    const d = tmp.length(); if(d<1e-5) continue;
    let rest = b.rest;
    let k = b.k * stiff;
    // 塩基対=磁力的: 近いと強く、離れすぎると切れて弱まる
    if(b.type==='pair'){
      const stretch = d - rest;
      const breakDist = rest*2.4;
      if(d>breakDist){ k*=0.05; }        // 引き離すと"外れた"感覚
      else k *= (1 + Math.max(0,-stretch)*0.3);
    }
    // メチル化領域の凝集
    let f = (d - rest) * k;
    tmp.multiplyScalar(f/d);
    if(!b.a.pinned) b.a.pos.add(tmp);
    if(!b.b.pinned) b.b.pos.sub(tmp);
  }
  // クロマチン凝集: メチル化ノード同士を引き寄せる
  if(params.compact>0){
    const meths = nodes.filter(n=>n.meth);
    const cs = params.compact*0.0006;
    for(let i=0;i<meths.length;i++)for(let j=i+1;j<meths.length;j++){
      tmp.copy(meths[j].pos).sub(meths[i].pos);
      const d=tmp.length(); if(d<0.01)continue;
      tmp.multiplyScalar(cs);
      if(!meths[i].pinned) meths[i].pos.add(tmp);
      if(!meths[j].pinned) meths[j].pos.sub(tmp);
    }
  }
  // 弱い中心復元（発散防止）
  for(const n of nodes){
    if(n.pinned) continue;
    // Verlet積分（速度=pos-prev、減衰）
    tmp.copy(n.pos).sub(n.prev).multiplyScalar(params.damp);
    n.prev.copy(n.pos);
    n.pos.add(tmp);
  }
}

// ---------- レンダー更新 ----------
function syncMeshes(){
  for(const n of nodes){
    if(n.mesh) n.mesh.position.copy(n.pos);
    if(n.methMesh){ n.methMesh.visible = n.meth;
      if(n.meth){ n.methMesh.position.copy(n.pos).y += 1.1; } }
  }
  for(const b of bonds){
    if(!b.mesh) continue;
    orientBond(b.mesh, b.a.pos, b.b.pos);
    if(b.type==='pair'){
      const d = b.a.pos.distanceTo(b.b.pos);
      b.mesh.material.opacity = d>b.rest*2.4? 0.12 : 0.85; // 外れると薄く
    }
  }
}

// ---------- インタラクション ----------
const raycaster = new Raycaster();
const mouse = new Vector2();
let dragNode = null;
const dragPlane = new Plane();
const dragPoint = new Vector3();

let pickBaseMode = false;   // 塩基入れ替えモード
let methPenMode = false;    // メチル化ペン

function pointerNode(e){
  const r = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX-r.left)/r.width)*2-1;
  mouse.y = -((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = nodes.filter(n=>n.mesh&&n.mesh.parent&&n.mesh.parent.visible).map(n=>n.mesh);
  const hit = raycaster.intersectObjects(meshes, false);
  return hit.length? hit[0].object.userData.node : null;
}

renderer.domElement.addEventListener('pointerdown', e=>{
  const n = pointerNode(e);
  if(!n) return;

  if(pickBaseMode && n.strand<2){ selectedForEdit = n; flash(n); return; }
  if(methPenMode && n.strand<2){ toggleMeth(n); return; }

  // ドラッグ開始
  dragNode = n; controls.enabled = false;
  dragPlane.setFromNormalAndCoplanarPoint(
    camera.getWorldDirection(new Vector3()).negate(), n.pos);
});
renderer.domElement.addEventListener('pointermove', e=>{
  if(!dragNode) return;
  const r = renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-r.left)/r.width)*2-1;
  mouse.y=-((e.clientY-r.top)/r.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  if(raycaster.ray.intersectPlane(dragPlane, dragPoint)){
    dragNode.pos.copy(dragPoint); dragNode.prev.copy(dragPoint);
    dragNode.pinned = true;
  }
});
addEventListener('pointerup', ()=>{
  if(dragNode){ dragNode.pinned=false; dragNode=null; }
  controls.enabled=true;
});

// ダブルクリック=ランダム変異
renderer.domElement.addEventListener('dblclick', e=>{
  const n = pointerNode(e);
  if(n && n.strand<2){
    let nb; do{ nb=BASES[Math.floor(Math.random()*4)]; }while(nb===n.base && Math.random()<0.7);
    setBase(n.idx, nb);
  }
});

let selectedForEdit = null;
function flash(n){
  const orig = n.mesh.material.emissive.getHex();
  n.mesh.material.emissive.setHex(0xffffff);
  setTimeout(()=>n.mesh.material.emissive.setHex(orig), 200);
}
function setBase(idx, b){
  sequence[idx]=b;
  const a = helixNodes[idx], comp = helixNodesB[idx];
  a.base=b; a.mesh.material.color.setHex(BASE_COLORS[b]);
  comp.base=COMPLEMENT[b]; comp.mesh.material.color.setHex(BASE_COLORS[COMPLEMENT[b]]);
  // C以外はメチル化解除
  if(b!=='C'){ a.meth=false; }
  updateSeqBox();
}
function toggleMeth(n){
  // メチル化はC(シトシン)のみ
  if(n.base!=='C'){ flash(n); return; }
  n.meth=!n.meth;
}

// ---------- UI ----------
const $ = s=>document.querySelector(s);
function updateSeqBox(){
  const box = $('#seqBox');
  box.innerHTML = sequence.map((b,i)=>
    `<span style="color:#${BASE_COLORS[b].toString(16).padStart(6,'0')}">${b}</span>`).join('');
}
document.querySelectorAll('[data-base]').forEach(btn=>{
  btn.onclick=()=>{
    if(selectedForEdit){ setBase(selectedForEdit.idx, btn.dataset.base); flash(selectedForEdit); }
    else alert('先に「塩基を選ぶ」をONにして、変えたい塩基をクリックしてね');
  };
});
$('#pickMode').onclick=e=>{
  pickBaseMode=!pickBaseMode; if(pickBaseMode) methPenMode=false, syncModeBtns();
  e.target.textContent='塩基を選ぶ: '+(pickBaseMode?'ON':'OFF');
  e.target.classList.toggle('on',pickBaseMode); updateModeLabel(); syncModeBtns();
};
$('#methToggle').onclick=e=>{
  methPenMode=!methPenMode; if(methPenMode) pickBaseMode=false;
  syncModeBtns(); updateModeLabel();
};
function syncModeBtns(){
  $('#pickMode').textContent='塩基を選ぶ: '+(pickBaseMode?'ON':'OFF');
  $('#pickMode').classList.toggle('on',pickBaseMode);
  $('#methToggle').textContent='メチル化ペン: '+(methPenMode?'ON':'OFF');
  $('#methToggle').classList.toggle('on',methPenMode);
}
function updateModeLabel(){
  $('#modeLabel').textContent = pickBaseMode?'塩基編集': methPenMode?'メチル化':'視点';
}
$('#compact').oninput=e=>params.compact=+e.target.value;
$('#stiff').oninput=e=>params.stiff=+e.target.value/100;
$('#damp').oninput=e=>params.damp=+e.target.value/100;
$('#translate').onclick=()=>{ translate(); };
$('#refold').onclick=()=>{ if(hasProtein){ proteinNodes.forEach(n=>{
  n.pos.add(new Vector3((Math.random()-.5)*4,(Math.random()-.5)*4,(Math.random()-.5)*4));
  n.prev.copy(n.pos); }); } };
$('#showDNA').onclick=e=>{
  params.showDNA=!params.showDNA;
  dnaGroup.visible=params.showDNA; bondGroup.visible=params.showDNA;
  e.target.classList.toggle('on',params.showDNA);
};
$('#reset').onclick=()=>{
  sequence="ATGGCACGTTACGGATCCAAAGAGTGA".split('');
  buildDNA(); while(protGroup.children.length) protGroup.remove(protGroup.children[0]);
  proteinNodes=[]; hasProtein=false;
  bonds=bonds.filter(b=>b.type!=='protein'&&b.type!=='hydrophobic');
  for(let i=nodes.length-1;i>=0;i--) if(nodes[i].strand===2) nodes.splice(i,1);
  $('#protBox').textContent='まだ翻訳していません';
  params.compact=0; $('#compact').value=0;
};

// ---------- ループ ----------
buildDNA();
let sub=2; // 1フレームあたり物理サブステップ
function animate(){
  requestAnimationFrame(animate);
  for(let s=0;s<sub;s++) physics();
  syncMeshes();
  controls.update();
  renderer.render(scene, camera);
}
animate();

addEventListener('resize', ()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
